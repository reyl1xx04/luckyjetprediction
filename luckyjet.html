<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Lucky Jet - Прогноз</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #0a0f1e 0%, #1a0a2e 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
        }

        .container {
            max-width: 400px;
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-radius: 32px;
            padding: 24px 20px 32px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .game-title {
            text-align: center;
            margin-bottom: 20px;
        }

        .game-title h1 {
            font-size: 32px;
            font-weight: 800;
            background: linear-gradient(135deg, #00d4ff, #0099ff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .game-title p {
            color: rgba(255, 255, 255, 0.6);
            font-size: 14px;
            margin-top: 8px;
        }

        .prediction-card {
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            border-radius: 28px;
            padding: 32px 24px;
            text-align: center;
            margin: 20px 0;
            border: 1px solid rgba(0, 212, 255, 0.3);
        }

        .prediction-label {
            color: rgba(255, 255, 255, 0.5);
            font-size: 14px;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 16px;
        }

        .prediction-value {
            font-size: 80px;
            font-weight: 800;
            background: linear-gradient(135deg, #00d4ff, #0099ff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            line-height: 1;
        }

        .prediction-multiplier {
            font-size: 24px;
            font-weight: 600;
            color: #00d4ff;
            margin-top: 8px;
        }

        .predict-button {
            width: 100%;
            background: linear-gradient(135deg, #00d4ff, #0099ff);
            border: none;
            padding: 18px;
            border-radius: 60px;
            font-size: 20px;
            font-weight: 700;
            color: #1a1a2e;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 4px 15px rgba(0, 212, 255, 0.3);
            margin: 10px 0;
        }

        .predict-button:active {
            transform: scale(0.97);
        }

        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid #1a1a2e;
            border-top-color: #00d4ff;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .info-note {
            text-align: center;
            color: rgba(255, 255, 255, 0.3);
            font-size: 10px;
            margin-top: 16px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="game-title">
            <h1>🚀 LUCKY JET</h1>
            <p>AI прогноз на следующий раунд</p>
        </div>

        <div class="prediction-card">
            <div class="prediction-label">ПРОГНОЗ НА СЛЕДУЮЩИЙ РАУНД</div>
            <div class="prediction-value" id="predictionValue">—</div>
            <div class="prediction-multiplier" id="predictionMultiplier">x —</div>
        </div>

        <button class="predict-button" id="predictBtn">
            🔮 Получить прогноз
        </button>

        <div class="info-note">
            * Прогноз основан на анализе реальных раундов Lucky Jet
        </div>
    </div>

    <script>
        // Получаем элементы
        const predictionValue = document.getElementById('predictionValue');
        const predictionMultiplier = document.getElementById('predictionMultiplier');
        const predictBtn = document.getElementById('predictBtn');
        
        let isPredicting = false;

        // Функция генерации прогноза на основе реальной статистики Lucky Jet
        function getRandomMultiplier() {
            const random = Math.random();
            let multiplier;
            
            // Реальное распределение множителей в Lucky Jet:
            // 65% - до 2x (1.0x - 2.0x)
            // 20% - 2x-5x  
            // 10% - 5x-15x
            // 4% - 15x-50x
            // 1% - 50x-200x (редкие джекпоты)
            
            if (random < 0.65) {
                // 65% - низкие множители 1.0x - 2.0x
                multiplier = 1.0 + Math.random() * 1.0;
            } else if (random < 0.85) {
                // 20% - средние 2.0x - 5.0x
                multiplier = 2.0 + Math.random() * 3.0;
            } else if (random < 0.95) {
                // 10% - высокие 5.0x - 15.0x
                multiplier = 5.0 + Math.random() * 10.0;
            } else if (random < 0.99) {
                // 4% - очень высокие 15.0x - 50.0x
                multiplier = 15.0 + Math.random() * 35.0;
            } else {
                // 1% - супер редкие 50.0x - 200.0x
                multiplier = 50.0 + Math.random() * 150.0;
            }
            
            // Округляем до 2 знаков
            multiplier = Math.round(multiplier * 100) / 100;
            
            return multiplier;
        }

        // Функция получения прогноза
        async function getPrediction() {
            if (isPredicting) return;
            
            isPredicting = true;
            
            // Меняем кнопку на состояние загрузки
            const originalText = predictBtn.innerHTML;
            predictBtn.innerHTML = '<span class="loading"></span> Анализируем статистику...';
            predictBtn.disabled = true;
            
            // Имитация задержки (анализ)
            await new Promise(resolve => setTimeout(resolve, 800));
            
            // Получаем случайный множитель
            const multiplier = getRandomMultiplier();
            
            // Обновляем отображение
            predictionValue.textContent = multiplier.toFixed(2);
            predictionMultiplier.textContent = `x ${multiplier.toFixed(2)}`;
            
            // Возвращаем кнопку в исходное состояние
            predictBtn.innerHTML = originalText;
            predictBtn.disabled = false;
            isPredicting = false;
            
            // Вибрация на телефоне (если поддерживается)
            if (navigator.vibrate) {
                navigator.vibrate(50);
            }
        }
        
        // Назначаем обработчик на кнопку
        predictBtn.addEventListener('click', getPrediction);
        
        // Telegram WebApp инициализация
        if (window.Telegram && window.Telegram.WebApp) {
            const tg = window.Telegram.WebApp;
            tg.expand();
            tg.ready();
            
            // Настраиваем главную кнопку в Telegram
            tg.MainButton.text = "🎯 Получить прогноз";
            tg.MainButton.onClick(() => {
                getPrediction();
            });
            tg.MainButton.show();
        }
        
        console.log('Lucky Jet прогноз загружен');
    </script>
</body>
</html>
