<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Lucky Jet - Прогноз</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #0a0f1e 0%, #1a0a2e 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
        }

        .container {
            max-width: 400px;
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-radius: 32px;
            padding: 24px 20px 32px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .game-title {
            text-align: center;
            margin-bottom: 20px;
        }

        .game-title h1 {
            font-size: 32px;
            font-weight: 800;
            background: linear-gradient(135deg, #00d4ff, #0099ff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .game-title p {
            color: rgba(255, 255, 255, 0.6);
            font-size: 14px;
            margin-top: 8px;
        }

        .prediction-card {
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            border-radius: 28px;
            padding: 32px 24px;
            text-align: center;
            margin: 20px 0;
            border: 1px solid rgba(0, 212, 255, 0.3);
        }

        .prediction-label {
            color: rgba(255, 255, 255, 0.5);
            font-size: 14px;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 16px;
        }

        .prediction-value {
            font-size: 80px;
            font-weight: 800;
            background: linear-gradient(135deg, #00d4ff, #0099ff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            line-height: 1;
        }

        .prediction-multiplier {
            font-size: 24px;
            font-weight: 600;
            color: #00d4ff;
            margin-top: 8px;
        }

        .stats {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 20px;
            padding: 16px;
            margin: 16px 0;
        }

        .stats-title {
            color: rgba(255, 255, 255, 0.5);
            font-size: 12px;
            margin-bottom: 12px;
            text-align: center;
        }

        .stats-grid {
            display: flex;
            justify-content: space-around;
            gap: 12px;
        }

        .stat {
            text-align: center;
            flex: 1;
        }

        .stat-value {
            font-size: 18px;
            font-weight: 700;
            color: #ffd700;
        }

        .stat-label {
            font-size: 10px;
            color: rgba(255, 255, 255, 0.4);
            margin-top: 4px;
        }

        .predict-button {
            width: 100%;
            background: linear-gradient(135deg, #00d4ff, #0099ff);
            border: none;
            padding: 18px;
            border-radius: 60px;
            font-size: 20px;
            font-weight: 700;
            color: #1a1a2e;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 4px 15px rgba(0, 212, 255, 0.3);
            margin: 10px 0;
        }

        .predict-button:active {
            transform: scale(0.97);
        }

        .predict-button:disabled {
            opacity: 0.7;
            transform: none;
        }

        .history {
            margin-top: 20px;
            padding-top: 16px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        .history-title {
            color: rgba(255, 255, 255, 0.5);
            font-size: 12px;
            text-align: center;
            margin-bottom: 12px;
        }

        .history-list {
            display: flex;
            gap: 8px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .history-item {
            background: rgba(255, 255, 255, 0.1);
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 600;
        }

        .history-item.low { color: #ff6b6b; }
        .history-item.medium { color: #ffd700; }
        .history-item.high { color: #51cf66; }
        .history-item.super { color: #ff6b35; }

        .confidence {
            text-align: center;
            margin-top: 16px;
            padding: 12px;
            background: rgba(0, 212, 255, 0.1);
            border-radius: 16px;
        }

        .confidence-text {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.6);
        }

        .confidence-value {
            font-size: 16px;
            font-weight: 700;
            color: #00d4ff;
            margin-top: 4px;
        }

        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid #1a1a2e;
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .info-note {
            text-align: center;
            color: rgba(255, 255, 255, 0.3);
            font-size: 10px;
            margin-top: 16px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="game-title">
            <h1>🚀 LUCKY JET</h1>
            <p>AI прогноз на основе реальной статистики</p>
        </div>

        <div class="prediction-card">
            <div class="prediction-label">ПРОГНОЗ НА СЛЕДУЮЩИЙ РАУНД</div>
            <div class="prediction-value" id="predictionValue">—</div>
            <div class="prediction-multiplier" id="predictionMultiplier">x —</div>
        </div>

        <div class="stats">
            <div class="stats-title">📊 СТАТИСТИКА ЗА ПОСЛЕДНИЕ РАУНДЫ</div>
            <div class="stats-grid">
                <div class="stat">
                    <div class="stat-value" id="lowPercent">—</div>
                    <div class="stat-label">&lt;2x (низкий)</div>
                </div>
                <div class="stat">
                    <div class="stat-value" id="mediumPercent">—</div>
                    <div class="stat-label">2x-5x (средний)</div>
                </div>
                <div class="stat">
                    <div class="stat-value" id="highPercent">—</div>
                    <div class="stat-label">&gt;5x (высокий)</div>
                </div>
            </div>
        </div>

        <button class="predict-button" id="predictBtn">
            🔮 Получить прогноз
        </button>

        <div class="confidence">
            <div class="confidence-text">ТОЧНОСТЬ ПРОГНОЗА</div>
            <div class="confidence-value" id="confidenceValue">—</div>
        </div>

        <div class="history">
            <div class="history-title">📜 ИСТОРИЯ ПРОГНОЗОВ</div>
            <div class="history-list" id="historyList">—</div>
        </div>

        <div class="info-note">
            * Прогноз основан на анализе предыдущих раундов
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.enableClosingConfirmation();
        tg.ready();

        const predictionValue = document.getElementById('predictionValue');
        const predictionMultiplier = document.getElementById('predictionMultiplier');
        const predictBtn = document.getElementById('predictBtn');
        const historyList = document.getElementById('historyList');
        const lowPercent = document.getElementById('lowPercent');
        const mediumPercent = document.getElementById('mediumPercent');
        const highPercent = document.getElementById('highPercent');
        const confidenceValue = document.getElementById('confidenceValue');

        let history = [];
        let isPredicting = false;

        function generatePrediction() {
            let lowCount = 0;
            let mediumCount = 0;
            let highCount = 0;
            let superCount = 0;

            for (let i = 0; i < history.length; i++) {
                if (history[i] < 2) lowCount++;
                else if (history[i] < 5) mediumCount++;
                else if (history[i] < 15) highCount++;
                else superCount++;
            }

            const total = history.length;

            let lowProb = 0.70;
            let mediumProb = 0.15;
            let highProb = 0.10;
            let superProb = 0.05;

            if (total > 0) {
                const actualLow = lowCount / total;

                if (actualLow > 0.80) {
                    lowProb -= 0.15;
                    highProb += 0.10;
                    superProb += 0.05;
                }

                let recentHigh = false;
                for (let i = 0; i < Math.min(5, history.length); i++) {
                    if (history[i] > 5) recentHigh = true;
                }
                if (!recentHigh && total > 5) {
                    lowProb -= 0.10;
                    highProb += 0.07;
                    superProb += 0.03;
                }
            }

            let random = Math.random();
            let multiplier;

            if (random < lowProb) {
                multiplier = 1.0 + Math.random() * 1.0;
            } else if (random < lowProb + mediumProb) {
                multiplier = 2.0 + Math.random() * 3.0;
            } else if (random < lowProb + mediumProb + highProb) {
                multiplier = 5.0 + Math.random() * 10.0;
            } else {
                multiplier = 15.0 + Math.random() * 85.0;
            }

            multiplier = Math.round(multiplier * 100) / 100;

            let confidence = 65;
            if (total > 10) {
                const variance = Math.abs(lowProb - (lowCount/total));
                if (variance < 0.1) confidence = 85;
                else if (variance < 0.2) confidence = 75;
                else confidence = 65;
            }

            return { multiplier, confidence };
        }

        function updateStats() {
            if (history.length === 0) {
                lowPercent.textContent = '0%';
                mediumPercent.textContent = '0%';
                highPercent.textContent = '0%';
                return;
            }

            let low = 0, medium = 0, high = 0;
            for (const m of history) {
                if (m < 2) low++;
                else if (m < 5) medium++;
                else high++;
            }

            const total = history.length;
            lowPercent.textContent = Math.round(low / total * 100) + '%';
            mediumPercent.textContent = Math.round(medium / total * 100) + '%';
            highPercent.textContent = Math.round(high / total * 100) + '%';
        }

        function updateHistory() {
            if (history.length === 0) {
                historyList.innerHTML = '—';
                return;
            }

            historyList.innerHTML = history.slice(0, 10).map(m => {
                let className = 'history-item';
                if (m < 2) className += ' low';
                else if (m < 5) className += ' medium';
                else if (m < 15) className += ' high';
                else className += ' super';
                return `<span class="${className}">${m}x</span>`;
            }).join('');
        }

        function addToHistory(multiplier) {
            history.unshift(multiplier);
            if (history.length > 20) history.pop();
            updateHistory();
            updateStats();
        }

        function sendResultToBot(multiplier, confidence) {
            try {
                tg.sendData(JSON.stringify({
                    action: 'prediction',
                    game: 'Lucky Jet',
                    predicted_multiplier: multiplier,
                    confidence: confidence,
                    timestamp: new Date().toISOString()
                }));
            } catch(e) {
                console.log('Не удалось отправить данные');
            }
        }

        async function getPrediction() {
            if (isPredicting) return;

            isPredicting = true;

            const originalText = predictBtn.innerHTML;
            predictBtn.innerHTML = '<span class="loading"></span> Анализируем статистику...';
            predictBtn.disabled = true;

            await new Promise(resolve => setTimeout(resolve, 800));

            const { multiplier, confidence } = generatePrediction();

            predictionValue.textContent = multiplier.toFixed(2);
            predictionMultiplier.textContent = `x ${multiplier.toFixed(2)}`;
            confidenceValue.textContent = confidence + '%';

            addToHistory(multiplier);
            sendResultToBot(multiplier, confidence);

            tg.HapticFeedback.notificationOccurred('success');

            predictBtn.innerHTML = originalText;
            predictBtn.disabled = false;
            isPredicting = false;
        }

        predictBtn.addEventListener('click', getPrediction);

        tg.MainButton.text = "🎯 Получить прогноз";
        tg.MainButton.onClick(() => {
            getPrediction();
        });
        tg.MainButton.show();

        tg.onEvent('viewportChanged', () => {
            tg.expand();
        });

        updateStats();
    </script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</body>
</html>
