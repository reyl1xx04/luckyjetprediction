<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Lucky Jet - Прогноз</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #0a0f1e 0%, #1a0a2e 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
        }

        .container {
            max-width: 400px;
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-radius: 32px;
            padding: 24px 20px 32px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .game-title {
            text-align: center;
            margin-bottom: 20px;
        }

        .game-title h1 {
            font-size: 32px;
            font-weight: 800;
            background: linear-gradient(135deg, #00d4ff, #0099ff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .game-title p {
            color: rgba(255, 255, 255, 0.6);
            font-size: 14px;
            margin-top: 8px;
        }

        .prediction-card {
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            border-radius: 28px;
            padding: 32px 24px;
            text-align: center;
            margin: 20px 0;
            border: 1px solid rgba(0, 212, 255, 0.3);
        }

        .prediction-value {
            font-size: 80px;
            font-weight: 800;
            background: linear-gradient(135deg, #00d4ff, #0099ff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            line-height: 1;
        }

        .multiplier-sign {
            font-size: 24px;
            font-weight: 600;
            color: #00d4ff;
            margin-top: 8px;
        }

        .predict-button {
            width: 100%;
            background: linear-gradient(135deg, #00d4ff, #0099ff);
            border: none;
            padding: 18px;
            border-radius: 60px;
            font-size: 20px;
            font-weight: 700;
            color: #1a1a2e;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 4px 15px rgba(0, 212, 255, 0.3);
            margin: 10px 0;
        }

        .predict-button:active {
            transform: scale(0.97);
        }

        .predict-button:disabled {
            opacity: 0.7;
            transform: none;
        }

        .confidence-box {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 20px;
            padding: 12px;
            margin-top: 15px;
            text-align: center;
        }

        .confidence-text {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.5);
            margin-bottom: 8px;
        }

        .confidence-value {
            font-size: 24px;
            font-weight: 700;
            color: #ffd700;
        }

        .confidence-approx {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.4);
            margin-left: 5px;
        }

        .confidence-bar {
            width: 100%;
            height: 4px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 4px;
            margin-top: 8px;
            overflow: hidden;
        }

        .confidence-fill {
            height: 100%;
            background: linear-gradient(90deg, #ffd700, #ff6b35);
            border-radius: 4px;
            transition: width 0.5s ease;
        }

        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid #1a1a2e;
            border-top-color: #00d4ff;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .info-note {
            text-align: center;
            color: rgba(255, 255, 255, 0.3);
            font-size: 10px;
            margin-top: 16px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="game-title">
            <h1>🚀 LUCKY JET</h1>
            <p>AI прогноз на следующий раунд</p>
        </div>

        <div class="prediction-card">
            <div class="prediction-value" id="predictionValue">—</div>
            <div class="multiplier-sign" id="multiplierSign">x —</div>
        </div>

        <button class="predict-button" id="predictBtn">
            🔮 Получить прогноз
        </button>

        <div class="confidence-box" id="confidenceBox" style="display: none;">
            <div class="confidence-text">ТОЧНОСТЬ ПРОГНОЗА</div>
            <div>
                <span class="confidence-value" id="confidenceValue">0</span>
                <span class="confidence-approx">%</span>
            </div>
            <div class="confidence-bar">
                <div class="confidence-fill" id="confidenceFill" style="width: 0%"></div>
            </div>
        </div>

        <div class="info-note">
            * Прогноз основан на анализе реальных раундов Lucky Jet
        </div>
    </div>

    <script>
        // Получаем элементы
        const predictionValue = document.getElementById('predictionValue');
        const multiplierSign = document.getElementById('multiplierSign');
        const predictBtn = document.getElementById('predictBtn');
        const confidenceBox = document.getElementById('confidenceBox');
        const confidenceValue = document.getElementById('confidenceValue');
        const confidenceFill = document.getElementById('confidenceFill');
        
        let isPredicting = false;

        // Функция генерации прогноза - С НИЗКОЙ ВЕРОЯТНОСТЬЮ ВЫСОКИХ ИКСОВ
        function getRandomMultiplier() {
            const random = Math.random();
            let multiplier;
            
            // НОВОЕ распределение множителей (высокие иксы РЕДКО):
            // 80% - до 2x (1.0x - 2.0x)  ← увеличил с 65% до 80%
            // 15% - 2x-5x                ← уменьшил с 20% до 15%
            // 4% - 5x-15x                ← уменьшил с 10% до 4%
            // 0.9% - 15x-50x             ← уменьшил с 4% до 0.9%
            // 0.1% - 50x-200x            ← уменьшил с 1% до 0.1%
            
            if (random < 0.80) {
                // 80% - низкие множители 1.0x - 2.0x
                multiplier = 1.0 + Math.random() * 1.0;
            } else if (random < 0.95) {
                // 15% - средние 2.0x - 5.0x
                multiplier = 2.0 + Math.random() * 3.0;
            } else if (random < 0.99) {
                // 4% - высокие 5.0x - 15.0x
                multiplier = 5.0 + Math.random() * 10.0;
            } else if (random < 0.999) {
                // 0.9% - очень высокие 15.0x - 50.0x
                multiplier = 15.0 + Math.random() * 35.0;
            } else {
                // 0.1% - супер редкие 50.0x - 200.0x
                multiplier = 50.0 + Math.random() * 150.0;
            }
            
            multiplier = Math.round(multiplier * 100) / 100;
            return multiplier;
        }

        // Функция расчета точности прогноза (от 1% до 100%)
        function getConfidence(multiplier) {
            let confidence;
            if (multiplier < 2) {
                confidence = 85 + Math.random() * 10; // 85-95%
            } else if (multiplier < 5) {
                confidence = 70 + Math.random() * 10; // 70-80%
            } else if (multiplier < 15) {
                confidence = 55 + Math.random() * 15; // 55-70%
            } else if (multiplier < 50) {
                confidence = 40 + Math.random() * 20; // 40-60%
            } else {
                confidence = 25 + Math.random() * 20; // 25-45%
            }
            return Math.round(confidence);
        }

        // Анимация появления результата
        function animateResult() {
            const card = document.querySelector('.prediction-card');
            card.style.transform = 'scale(1.02)';
            setTimeout(() => {
                card.style.transform = 'scale(1)';
            }, 200);
        }

        // Функция получения прогноза
        async function getPrediction() {
            if (isPredicting) return;
            
            isPredicting = true;
            
            // Меняем кнопку на состояние загрузки
            const originalText = predictBtn.innerHTML;
            predictBtn.innerHTML = '<span class="loading"></span> Анализируем статистику...';
            predictBtn.disabled = true;
            
            // Скрываем точность во время загрузки
            confidenceBox.style.display = 'none';
            
            // Имитация задержки (анализ)
            await new Promise(resolve => setTimeout(resolve, 800));
            
            // Получаем случайный множитель
            const multiplier = getRandomMultiplier();
            const confidence = getConfidence(multiplier);
            
            // Обновляем отображение прогноза
            predictionValue.textContent = multiplier.toFixed(2);
            multiplierSign.textContent = `x ${multiplier.toFixed(2)}`;
            
            // Обновляем отображение точности
            confidenceValue.textContent = confidence;
            confidenceFill.style.width = confidence + '%';
            confidenceBox.style.display = 'block';
            
            // Анимация
            animateResult();
            
            // Вибрация на телефоне
            if (navigator.vibrate) {
                if (multiplier > 15) {
                    navigator.vibrate([100, 50, 100]);
                } else {
                    navigator.vibrate(50);
                }
            }
            
            // Возвращаем кнопку в исходное состояние
            predictBtn.innerHTML = originalText;
            predictBtn.disabled = false;
            isPredicting = false;
            
            // Отправляем результат в Telegram
            if (window.Telegram && window.Telegram.WebApp) {
                try {
                    window.Telegram.WebApp.HapticFeedback.notificationOccurred('success');
                } catch(e) {}
            }
        }
        
        // Назначаем обработчик на кнопку
        predictBtn.addEventListener('click', getPrediction);
        
        // Telegram WebApp инициализация
        if (window.Telegram && window.Telegram.WebApp) {
            const tg = window.Telegram.WebApp;
            tg.expand();
            tg.ready();
            tg.enableClosingConfirmation();
            
            tg.MainButton.text = "🎯 Получить прогноз";
            tg.MainButton.onClick(() => {
                getPrediction();
            });
            tg.MainButton.show();
        }
        
        console.log('Lucky Jet прогноз загружен');
    </script>
</body>
</html>
