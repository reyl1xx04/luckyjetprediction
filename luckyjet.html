<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Lucky Jet - Прогноз</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #0a0f1e 0%, #1a0a2e 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
        }
        .container {
            max-width: 400px;
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 32px;
            padding: 24px;
            text-align: center;
        }
        h1 {
            font-size: 32px;
            background: linear-gradient(135deg, #00d4ff, #0099ff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .prediction {
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            border-radius: 28px;
            padding: 32px;
            margin: 20px 0;
        }
        .value {
            font-size: 80px;
            font-weight: 800;
            background: linear-gradient(135deg, #00d4ff, #0099ff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        button {
            width: 100%;
            background: linear-gradient(135deg, #00d4ff, #0099ff);
            border: none;
            padding: 18px;
            border-radius: 60px;
            font-size: 20px;
            font-weight: 700;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚀 LUCKY JET</h1>
        <div class="prediction">
            <div class="value" id="result">—</div>
            <div id="multiplier">x —</div>
        </div>
        <button onclick="getPrediction()">🔮 Получить прогноз</button>
    </div>
    <script>
        function getPrediction() {
            let random = Math.random();
            let multiplier;
            if (random < 0.70) multiplier = 1.0 + Math.random() * 1.0;
            else if (random < 0.85) multiplier = 2.0 + Math.random() * 3.0;
            else if (random < 0.95) multiplier = 5.0 + Math.random() * 10.0;
            else multiplier = 15.0 + Math.random() * 85.0;
            multiplier = Math.round(multiplier * 100) / 100;
            document.getElementById('result').innerHTML = multiplier.toFixed(2);
            document.getElementById('multiplier').innerHTML = 'x ' + multiplier.toFixed(2);
        }
    </script>
</body>
</html>
