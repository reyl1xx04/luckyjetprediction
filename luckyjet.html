<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Lucky Jet - Прогноз</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #0a0f1e 0%, #1a0a2e 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
        }

        .container {
            max-width: 400px;
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-radius: 32px;
            padding: 24px 20px 32px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .game-title {
            text-align: center;
            margin-bottom: 20px;
        }

        .game-title h1 {
            font-size: 32px;
            font-weight: 800;
            background: linear-gradient(135deg, #00d4ff, #0099ff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .game-title p {
            color: rgba(255, 255, 255, 0.6);
            font-size: 14px;
            margin-top: 8px;
        }

        .prediction-card {
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            border-radius: 28px;
            padding: 32px 24px;
            text-align: center;
            margin: 20px 0;
            border: 1px solid rgba(0, 212, 255, 0.3);
        }

        .prediction-value {
            font-size: 80px;
            font-weight: 800;
            background: linear-gradient(135deg, #00d4ff, #0099ff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            line-height: 1;
        }

        .multiplier-sign {
            font-size: 24px;
            font-weight: 600;
            color: #00d4ff;
            margin-top: 8px;
        }

        .predict-button {
            width: 100%;
            background: linear-gradient(135deg, #00d4ff, #0099ff);
            border: none;
            padding: 18px;
            border-radius: 60px;
            font-size: 20px;
            font-weight: 700;
            color: #1a1a2e;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 4px 15px rgba(0, 212, 255, 0.3);
            margin: 10px 0;
        }

        .predict-button:active {
            transform: scale(0.97);
        }

        .predict-button:disabled {
            opacity: 0.7;
            transform: none;
        }

        .confidence-box {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 20px;
            padding: 12px;
            margin-top: 15px;
            text-align: center;
        }

        .confidence-text {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.5);
            margin-bottom: 8px;
        }

        .confidence-value {
            font-size: 24px;
            font-weight: 700;
            color: #ffd700;
        }

        .confidence-approx {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.4);
            margin-left: 5px;
        }

        .confidence-bar {
            width: 100%;
            height: 4px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 4px;
            margin-top: 8px;
            overflow: hidden;
        }

        .confidence-fill {
            height: 100%;
            background: linear-gradient(90deg, #ffd700, #ff6b35);
            border-radius: 4px;
            transition: width 0.5s ease;
        }

        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid #1a1a2e;
            border-top-color: #00d4ff;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .info-note {
            text-align: center;
            color: rgba(255, 255, 255, 0.3);
            font-size: 10px;
            margin-top: 16px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="game-title">
            <h1>🚀 LUCKY JET</h1>
            <p>AI прогноз на следующий раунд</p>
        </div>

        <div class="prediction-card">
            <div class="prediction-value" id="predictionValue">—</div>
            <div class="multiplier-sign" id="multiplierSign">x —</div>
        </div>

        <button class="predict-button" id="predictBtn">
            🔮 Получить прогноз
        </button>

        <div class="confidence-box" id="confidenceBox" style="display: none;">
            <div class="confidence-text">ТОЧНОСТЬ ПРОГНОЗА</div>
            <div>
                <span class="confidence-value" id="confidenceValue">0</span>
                <span class="confidence-approx">%</span>
            </div>
            <div class="confidence-bar">
                <div class="confidence-fill" id="confidenceFill" style="width: 0%"></div>
            </div>
        </div>

        <div class="info-note">
            * Прогноз основан на анализе реальных раундов Lucky Jet
        </div>
    </div>

    <script>
        const predictionValue = document.getElementById('predictionValue');
        const multiplierSign = document.getElementById('multiplierSign');
        const predictBtn = document.getElementById('predictBtn');
        const confidenceBox = document.getElementById('confidenceBox');
        const confidenceValue = document.getElementById('confidenceValue');
        const confidenceFill = document.getElementById('confidenceFill');
        
        let isPredicting = false;

        // РЕАЛИСТИЧНЫЕ ШАНСЫ ДЛЯ LUCKY JET (на 100 раундов)
        // 82% - до 2x
        // 10% - 2x-5x
        // 5% - 5x-15x
        // 2.5% - 15x-50x
        // 0.5% - 50x-200x
        
function getRandomMultiplier() {

    const random = Math.random();

    let multiplier;

    // 58% — очень низкие 1.00x - 1.35x
    if (random < 0.58) {

        multiplier = 1.00 + Math.random() * 0.35;

    }

    // 24% — низкие 1.35x - 2.00x
    else if (random < 0.82) {

        multiplier = 1.35 + Math.random() * 0.65;

    }

    // 11% — средние 2x - 5x
    else if (random < 0.93) {

        multiplier = 2 + Math.random() * 3;

    }

    // 5% — высокие 5x - 15x
    else if (random < 0.98) {

        multiplier = 5 + Math.random() * 10;

    }

    // 1.5% — очень редкие 15x - 50x
    else if (random < 0.995) {

        multiplier = 15 + Math.random() * 35;

    }

    // 0.5% — сверхредкие 50x+
    else {

        multiplier = 50 + Math.random() * 150;

    }

    return Number(multiplier.toFixed(2));
}

function getConfidence(multiplier) {

    let confidence;

    if (multiplier < 1.5) {

        confidence = 88 + Math.random() * 8;

    }

    else if (multiplier < 2) {

        confidence = 75 + Math.random() * 10;

    }

    else if (multiplier < 5) {

        confidence = 55 + Math.random() * 15;

    }

    else if (multiplier < 15) {

        confidence = 40 + Math.random() * 15;

    }

    else {

        confidence = 20 + Math.random() * 20;

    }

    return Math.round(confidence);
}

        function animateResult() {
            const card = document.querySelector('.prediction-card');
            card.style.transform = 'scale(1.02)';
            setTimeout(() => {
                card.style.transform = 'scale(1)';
            }, 200);
        }

        async function getPrediction() {
            if (isPredicting) return;
            
            isPredicting = true;
            
            const originalText = predictBtn.innerHTML;
            predictBtn.innerHTML = '<span class="loading"></span> Анализируем статистику...';
            predictBtn.disabled = true;
            
            confidenceBox.style.display = 'none';
            
            await new Promise(resolve => setTimeout(resolve, 800));
            
            const multiplier = getRandomMultiplier();
            const confidence = getConfidence(multiplier);
            
            predictionValue.textContent = multiplier.toFixed(2);
            multiplierSign.textContent = `x ${multiplier.toFixed(2)}`;
            
            confidenceValue.textContent = confidence;
            confidenceFill.style.width = confidence + '%';
            confidenceBox.style.display = 'block';
            
            animateResult();
            
            if (navigator.vibrate) {
                if (multiplier > 15) {
                    navigator.vibrate([100, 50, 100]);
                } else {
                    navigator.vibrate(50);
                }
            }
            
            predictBtn.innerHTML = originalText;
            predictBtn.disabled = false;
            isPredicting = false;
            
            if (window.Telegram && window.Telegram.WebApp) {
                try {
                    window.Telegram.WebApp.HapticFeedback.notificationOccurred('success');
                } catch(e) {}
            }
        }
        
        predictBtn.addEventListener('click', getPrediction);
        
        if (window.Telegram && window.Telegram.WebApp) {
            const tg = window.Telegram.WebApp;
            tg.expand();
            tg.ready();
            tg.enableClosingConfirmation();
            
            tg.MainButton.text = "🎯 Получить прогноз";
            tg.MainButton.onClick(() => {
                getPrediction();
            });
            tg.MainButton.show();
        }
        
        console.log('Lucky Jet прогноз загружен');
    </script>
</body>
</html>
