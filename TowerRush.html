<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Tower Rush - Прогноз</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #0a0f1e 0%, #1a0a2e 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
        }

        .container {
            max-width: 400px;
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-radius: 32px;
            padding: 24px 20px 32px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .game-title {
            text-align: center;
            margin-bottom: 20px;
        }

        .game-title h1 {
            font-size: 32px;
            font-weight: 800;
            background: linear-gradient(135deg, #ffd700, #ff8c00);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .game-title p {
            color: rgba(255, 255, 255, 0.6);
            font-size: 14px;
            margin-top: 8px;
        }

        .prediction-card {
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            border-radius: 28px;
            padding: 32px 24px;
            text-align: center;
            margin: 20px 0;
            border: 1px solid rgba(255, 215, 0, 0.3);
        }

        .prediction-value {
            font-size: 80px;
            font-weight: 800;
            background: linear-gradient(135deg, #ffd700, #ff8c00);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            line-height: 1;
        }

        .floors-sign {
            font-size: 24px;
            font-weight: 600;
            color: #ffd700;
            margin-top: 8px;
        }

        .predict-button {
            width: 100%;
            background: linear-gradient(135deg, #ffd700, #ff8c00);
            border: none;
            padding: 18px;
            border-radius: 60px;
            font-size: 20px;
            font-weight: 700;
            color: #1a1a2e;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 4px 15px rgba(255, 215, 0, 0.3);
            margin: 10px 0;
        }

        .predict-button:active {
            transform: scale(0.97);
        }

        .predict-button:disabled {
            opacity: 0.7;
            transform: none;
        }

        .confidence-box {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 20px;
            padding: 12px;
            margin-top: 15px;
            text-align: center;
        }

        .confidence-text {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.5);
            margin-bottom: 8px;
        }

        .confidence-value {
            font-size: 24px;
            font-weight: 700;
            color: #ffd700;
        }

        .confidence-approx {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.4);
            margin-left: 5px;
        }

        .confidence-bar {
            width: 100%;
            height: 4px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 4px;
            margin-top: 8px;
            overflow: hidden;
        }

        .confidence-fill {
            height: 100%;
            background: linear-gradient(90deg, #ffd700, #ff8c00);
            border-radius: 4px;
            transition: width 0.5s ease;
        }

        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid #1a1a2e;
            border-top-color: #ffd700;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .info-note {
            text-align: center;
            color: rgba(255, 255, 255, 0.3);
            font-size: 10px;
            margin-top: 16px;
        }

        .tower-preview {
            display: flex;
            justify-content: center;
            gap: 6px;
            margin: 15px 0;
            height: 80px;
            align-items: flex-end;
        }

        .tower-block {
            width: 30px;
            background: linear-gradient(180deg, #ffd700, #ff8c00);
            border-radius: 6px 6px 0 0;
            transition: height 0.4s ease;
            box-shadow: 0 -2px 10px rgba(255, 215, 0, 0.3);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="game-title">
            <h1>🏠 TOWER RUSH</h1>
            <p>Прогноз безопасного этажа</p>
        </div>

        <div class="tower-preview" id="towerPreview">
            <div style="color: rgba(255,255,255,0.3);">нажмите "Получить прогноз"</div>
        </div>

        <div class="prediction-card">
            <div class="prediction-value" id="predictionValue">—</div>
            <div class="floors-sign" id="floorsSign">этажей</div>
        </div>

        <button class="predict-button" id="predictBtn">
            🔮 Получить прогноз
        </button>

        <div class="confidence-box" id="confidenceBox" style="display: none;">
            <div class="confidence-text">ВЕРОЯТНОСТЬ ПРОХОДА</div>
            <div>
                <span class="confidence-value" id="confidenceValue">0</span>
                <span class="confidence-approx">%</span>
            </div>
            <div class="confidence-bar">
                <div class="confidence-fill" id="confidenceFill" style="width: 0%"></div>
            </div>
        </div>

        <div class="info-note">
            * Прогноз основан на реальной статистике Tower Rush
        </div>
    </div>

    <script>
        const predictionValue = document.getElementById('predictionValue');
        const floorsSign = document.getElementById('floorsSign');
        const predictBtn = document.getElementById('predictBtn');
        const confidenceBox = document.getElementById('confidenceBox');
        const confidenceValue = document.getElementById('confidenceValue');
        const confidenceFill = document.getElementById('confidenceFill');
        const towerPreview = document.getElementById('towerPreview');

        let isPredicting = false;

        // ЧЕСТНЫЕ РЕАЛИСТИЧНЫЕ ШАНСЫ ДЛЯ КАЗИНО
        // В 80% случаев игрок заканчивает на 1-2 этажах
        // Дойти до 5+ этажей — большая удача

        function getRandomFloors() {
            const random = Math.random();
            let floors;

            if (random < 0.6) {
                // 55% - 1 этаж
                floors = 1;
            } else if (random < 0.7) {
                // 25% - 2 этажа
                floors = 2;
            } else if (random < 0.92) {
                // 12% - 3 этажа
                floors = 3;
            } else if (random < 0.97) {
                // 5% - 4 этажа
                floors = 4;
            } else if (random < 0.99) {
                // 2% - 5 этажей
                floors = 5;
            } else if (random < 0.998) {
                // 0.8% - 6 этажей
                floors = 6;
            } else {
                // 0.2% - 7+ этажей (редчайший успех)
                floors = Math.floor(Math.random() * 5) + 7;
            }

            return floors;
        }

        function updateTowerPreview(floors) {
            towerPreview.innerHTML = '';
            const maxHeight = 70;
            for (let i = 0; i < Math.min(floors, 12); i++) {
                const block = document.createElement('div');
                block.className = 'tower-block';
                const height = Math.max(20, Math.min(25 + (i * 4), maxHeight));
                block.style.height = height + 'px';
                towerPreview.appendChild(block);
            }
        }

        function getConfidence(floors) {
            // Вероятность успешно пройти это количество этажей
            if (floors === 1) return 92 + Math.random() * 5;
            if (floors === 2) return 78 + Math.random() * 8;
            if (floors === 3) return 62 + Math.random() * 10;
            if (floors === 4) return 45 + Math.random() * 12;
            if (floors === 5) return 30 + Math.random() * 12;
            if (floors === 6) return 18 + Math.random() * 10;
            return 8 + Math.random() * 10;
        }

        function animateResult() {
            const card = document.querySelector('.prediction-card');
            card.style.transform = 'scale(1.02)';
            setTimeout(() => {
                card.style.transform = 'scale(1)';
            }, 200);
        }

        async function getPrediction() {
            if (isPredicting) return;

            isPredicting = true;

            const originalText = predictBtn.innerHTML;
            predictBtn.innerHTML = '<span class="loading"></span> Анализируем риски...';
            predictBtn.disabled = true;

            confidenceBox.style.display = 'none';
            towerPreview.innerHTML = '<div style="color: rgba(255,255,255,0.3);">строим башню...</div>';

            await new Promise(resolve => setTimeout(resolve, 900));

            const floors = getRandomFloors();
            const confidence = Math.round(getConfidence(floors));

            predictionValue.textContent = floors;

            let wordForm = 'этажей';
            if (floors === 1) wordForm = 'этаж';
            else if (floors <= 4) wordForm = 'этажа';
            floorsSign.textContent = wordForm;

            updateTowerPreview(floors);

            confidenceValue.textContent = confidence;
            confidenceFill.style.width = confidence + '%';
            confidenceBox.style.display = 'block';

            animateResult();

            if (navigator.vibrate) {
                if (floors >= 5) {
                    navigator.vibrate([100, 50, 100]);
                } else {
                    navigator.vibrate(40);
                }
            }

            predictBtn.innerHTML = originalText;
            predictBtn.disabled = false;
            isPredicting = false;

            if (window.Telegram && window.Telegram.WebApp) {
                try {
                    window.Telegram.WebApp.HapticFeedback.notificationOccurred('success');
                } catch(e) {}
            }
        }

        predictBtn.addEventListener('click', getPrediction);

        if (window.Telegram && window.Telegram.WebApp) {
            const tg = window.Telegram.WebApp;
            tg.expand();
            tg.ready();
            tg.enableClosingConfirmation();

            tg.MainButton.text = "🏠 Получить прогноз";
            tg.MainButton.onClick(() => {
                getPrediction();
            });
            tg.MainButton.show();
        }

        console.log('Tower Rush прогноз загружен');
    </script>
</body>
</html>
